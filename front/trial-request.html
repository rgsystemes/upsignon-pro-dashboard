<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Tester 1 mois gratuitement</title>
    <style>
      :root {
        --bg: #f7fafc;
        --card: #ffffff;
        --text: #33475b;
        --muted: #516f90;
        --border: #cbd6e2;
        --primary: #ff7a59;
        --primary-hover: #ff8f73;
        --primary-active: #e66e50;
        --error: #f2545b;
        --primary-contrast: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: transparent;
        color: var(--text);
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      }

      .page {
        min-height: 0;
        padding: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.75rem;
        font-weight: 700;
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .activity {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .activity button {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        border-radius: 4px;
        padding: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: border-color 0.15s ease;
      }

      .activity button.active {
        background: #fff4f1;
        border-color: var(--primary);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 14px;
        color: var(--text);
        font-weight: 500;
      }

      .field input,
      .field select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 10px 12px;
        font-size: 14px;
        color: var(--text);
        background: #fff;
      }

      .field input:focus,
      .field select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 1px var(--primary);
      }

      .field.error input,
      .field.error select {
        border-color: var(--error);
      }

      .fieldError {
        color: var(--error);
        font-size: 12px;
        line-height: 1.3;
        min-height: 16px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .languageRow {
        margin-bottom: 12px;
      }

      .consent {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }

      .consent label {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        font-size: 13px;
        color: #344469;
      }

      .consent label.error {
        color: var(--error);
      }

      .consent input[type='checkbox'] {
        margin-top: 2px;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .submit {
        border: 1px solid var(--primary);
        border-radius: 3px;
        background: var(--primary);
        color: var(--primary-contrast);
        padding: 11px 20px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
      }

      .submit:hover,
      .submit:focus {
        background: var(--primary-hover);
        border-color: var(--primary-hover);
      }

      .submit:active {
        background: var(--primary-active);
        border-color: var(--primary-active);
      }

      .submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .successPanel {
        display: none;
        margin-top: 18px;
        padding: 18px;
        border: 1px solid #cfe5d7;
        border-radius: 6px;
        background: #f3fbf6;
      }

      .successMessage {
        margin: 0;
        color: #1f5131;
        font-size: 1.1rem;
        font-weight: 600;
        line-height: 1.45;
      }

      .linkButton {
        margin-top: 12px;
        border: 0;
        background: transparent;
        color: #1a5bbf;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: underline;
        cursor: pointer;
        padding: 0;
      }

      .linkButton:hover,
      .linkButton:focus {
        color: #0f4699;
      }

      @media (max-width: 350px) {
        .card {
          padding: 10px;
        }

        .activity,
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <main class="page">
      <section class="card">
        <h1>Tester 1 mois gratuitement</h1>
        <div id="trialRequestContent">
          <p class="subtitle">Quelle est votre activité ?</p>

          <div class="activity" role="radiogroup" aria-label="Type d'activité">
            <button id="mspBtn" type="button" data-activity="msp">
              MSP, Revendeur, Infogérance
            </button>
            <button id="enterpriseBtn" type="button" data-activity="enterprise">
              Entreprise privée ou publique
            </button>
          </div>

          <form id="trialRequestForm" novalidate style="display: none">
            <input id="activityType" name="activityType" type="hidden" value="msp" />

            <div class="grid">
              <div class="field">
                <label for="firstname">Prénom*</label>
                <input id="firstname" name="firstname" required />
              </div>
              <div class="field">
                <label for="lastname">Nom*</label>
                <input id="lastname" name="lastname" required />
              </div>
              <div class="field">
                <label for="email">E-mail*</label>
                <input id="email" name="email" type="email" required />
              </div>
              <div class="field">
                <label for="phone">Numéro de téléphone*</label>
                <input id="phone" name="phone" type="tel" required />
              </div>
              <div class="field">
                <label for="company">Nom de l'entreprise*</label>
                <input id="company" name="company" required />
              </div>
              <div class="field">
                <label for="zip">Code postal*</label>
                <input id="zip" name="zip" required />
              </div>

              <div id="enterpriseFields" class="field">
                <label for="businessSector">Secteur d'activité*</label>
                <select id="businessSector" name="businessSector">
                  <option value="">Veuillez sélectionner</option>
                  <option>Industrie</option>
                  <option>Commerce / Distribution</option>
                  <option>Bâtiment / Immobilier / Travaux publics</option>
                  <option>Transport / Logistique</option>
                  <option>Arts / Médias / Communication</option>
                  <option>IT/Telecom</option>
                  <option>Secteur Public</option>
                  <option>Education</option>
                  <option>Santé</option>
                  <option>Banque et Finance</option>
                  <option>MSP Infogérance</option>
                  <option>Association</option>
                  <option>Étudiant</option>
                  <option>Particulier</option>
                </select>
              </div>

              <div id="enterpriseEmployees" class="field">
                <label for="employeeCount">Nombre de salariés</label>
                <select id="employeeCount" name="employeeCount">
                  <option value="">Veuillez sélectionner</option>
                  <option>1 à 49</option>
                  <option>50 à 99</option>
                  <option>100 à 249</option>
                  <option>250 à 499</option>
                  <option>500 à 999</option>
                  <option>1000 a 4999</option>
                  <option>5000 a 9999</option>
                  <option>10 000 et plus</option>
                </select>
              </div>
              <div class="field languageRow">
                <label for="languageSelect">Langue</label>
                <select id="languageSelect" name="language">
                  <option value="fr">Français</option>
                  <option value="en">English</option>
                </select>
              </div>
            </div>

            <div class="consent">
              <p id="marketingIntro" class="status" style="margin: 0"></p>
              <label>
                <input id="marketingConsent" name="marketingConsent" type="checkbox" />
                <span id="marketingConsentText"></span>
              </label>
              <label>
                <input id="privacyConsent" name="privacyConsent" type="checkbox" required />
                <span id="privacyConsentText"></span>
              </label>
              <div id="privacyConsentError" class="fieldError"></div>
            </div>

            <div class="actions">
              <button class="submit" id="submitButton" type="submit">Envoyer</button>
              <span id="status" class="status" aria-live="polite"></span>
            </div>
          </form>
        </div>

        <div id="successPanel" class="successPanel" aria-live="polite">
          <p id="successMessage" class="successMessage"></p>
          <button id="showFormButton" class="linkButton" type="button">
            Revenir au formulaire
          </button>
        </div>
      </section>
    </main>

    <script type="module" src="./trial-request.js"></script>
    <script
      type="text/javascript"
      id="hs-script-loader-rg"
      async
      defer
      src="%VITE_HUBSPOT_RG_TRACKING_SCRIPT_URL%"
    ></script>
    <script
      type="text/javascript"
      id="hs-script-loader-zaza"
      async
      defer
      src="%VITE_HUBSPOT_ZAZA_TRACKING_SCRIPT_URL%"
    ></script>
  </body>
</html>
