<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Validation de la demande</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --success: #0f766e;
        --success-bg: rgba(15, 118, 110, 0.12);
        --error: #b91c1c;
        --error-bg: rgba(185, 28, 28, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          Poppins,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: radial-gradient(circle at top left, #ffffff 0%, var(--bg) 55%);
        color: var(--text);
      }

      .card {
        width: 100%;
        max-width: 640px;
        background: var(--card);
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      }

      .badge {
        display: inline-block;
        margin-bottom: 14px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .badge.success {
        background: var(--success-bg);
        color: var(--success);
      }

      .badge.error,
      .badge.loading {
        background: var(--error-bg);
        color: var(--error);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2.2vw, 1.9rem);
        line-height: 1.25;
      }

      p {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 1rem;
      }

      .actions {
        margin-top: 22px;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        border-radius: 10px;
        border: 1px solid currentColor;
        padding: 10px 16px;
        font-weight: 600;
      }

      .btn.success {
        color: var(--success);
      }

      .btn.error,
      .btn.loading {
        color: var(--error);
      }

      .btn:hover {
        background: rgba(15, 23, 42, 0.03);
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-live="polite">
      <span id="badge" class="badge loading">Chargement</span>
      <h1 id="title">Validation en cours...</h1>
      <p id="message">Nous traitons votre demande, veuillez patienter.</p>
      <div class="actions">
        <a id="backToSite" class="btn loading" href="https://upsignon.eu">Retour au site</a>
      </div>
    </main>

    <script type="module" src="./trial-request-confirm.js"></script>
  </body>
</html>
